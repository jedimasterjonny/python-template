name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Stage scaffold so pre-commit sees all files
        working-directory: ${{ runner.temp }}/generated
        run: |
          git init -q
          git -c user.email=ci@example.com -c user.name='Template CI' add -A
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('template/.pre-commit-config.yaml') }}
      - name: Run pre-commit
        working-directory: ${{ runner.temp }}/generated
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Run pytest
        working-directory: ${{ runner.temp }}/generated
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Build
        working-directory: ${{ runner.temp }}/generated
        run: uv build
