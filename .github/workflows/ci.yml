name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - uses: ./.github/actions/scaffold
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Stage scaffold so pre-commit sees all files
        working-directory: ${{ runner.temp }}/generated
        run: |
          git init -q
          git -c user.email=ci@example.com -c user.name='Template CI' add -A
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('template/.pre-commit-config.yaml') }}
      - name: Run pre-commit
        working-directory: ${{ runner.temp }}/generated
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - uses: ./.github/actions/scaffold
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Run pytest
        working-directory: ${{ runner.temp }}/generated
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - uses: ./.github/actions/scaffold
      - name: Build
        working-directory: ${{ runner.temp }}/generated
        run: uv build
