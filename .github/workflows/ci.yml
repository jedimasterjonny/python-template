name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Stage scaffold so pre-commit sees all files
        working-directory: ${{ runner.temp }}/generated
        run: |
          git init -q
          git -c user.email=ci@example.com -c user.name='Template CI' add -A
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('template/.pre-commit-config.yaml') }}
      - name: Run pre-commit
        working-directory: ${{ runner.temp }}/generated
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Sync generated project
        working-directory: ${{ runner.temp }}/generated
        run: uv sync
      - name: Run pytest
        working-directory: ${{ runner.temp }}/generated
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Scaffold project from template
        run: |
          uvx copier copy . "$RUNNER_TEMP/generated" --vcs-ref HEAD --defaults \
            --data project_name='Template CI Smoke' \
            --data author_name='Template CI' \
            --data author_email='ci@example.com' \
            --data github_username='jedimasterjonny'
      - name: Build
        working-directory: ${{ runner.temp }}/generated
        run: uv build
